<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderManager — Gestão de Pedidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/orderManager.tokens.css">
    <link rel="stylesheet" href="../Css/orderManager.layout.css">
    <link rel="stylesheet" href="../Css/orderManager.components.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">OrderManager</a>
            <nav class="nav-links">
                <a href="index.html">Início</a>
                <a href="pedidos.html" class="active">Pedidos</a>
            </nav>
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="filterSearch" placeholder="Buscar pedido (nº, cliente ou restaurante)">
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <h1 class="hero-title">Gestão de pedidos</h1>

            <div class="summary-grid" id="summaryGrid">
                <div class="skeleton" style="height:80px"></div>
                <div class="skeleton" style="height:80px"></div>
                <div class="skeleton" style="height:80px"></div>
                <div class="skeleton" style="height:80px"></div>
            </div>

            <div class="filters-bar">
                <select id="filterStatus">
                    <option value="">Todos os status</option>
                    <option value="Received">Recebido</option>
                    <option value="Preparing">Em preparo</option>
                    <option value="OnTheWay">A caminho</option>
                    <option value="Delivered">Entregue</option>
                </select>
                <select id="filterRestaurant">
                    <option value="">Todos os restaurantes</option>
                </select>
            </div>

            <section class="panel-section" id="customerPanel">
                <button type="button" class="panel-toggle" id="customerPanelToggle" aria-expanded="false">
                    <span>📞 Cadastrar cliente (pedido por telefone)</span>
                    <span class="panel-toggle-icon">▼</span>
                </button>
                <div class="panel-body hidden" id="customerPanelBody">
                    <form id="customerForm" class="customer-form">
                        <div class="form-row">
                            <label for="customerName">Nome *</label>
                            <input type="text" id="customerName" required placeholder="Nome do cliente">
                        </div>
                        <div class="form-row">
                            <label for="customerPhone">Telefone</label>
                            <input type="tel" id="customerPhone" placeholder="(11) 99999-0000">
                        </div>

                        <fieldset class="address-fieldset">
                            <legend>Endereço</legend>
                            <div class="address-mode">
                                <label class="address-mode-option">
                                    <input type="radio" name="addressMode" value="cep" checked>
                                    Buscar por CEP
                                </label>
                                <label class="address-mode-option">
                                    <input type="radio" name="addressMode" value="manual">
                                    Digitar manualmente
                                </label>
                            </div>

                            <div id="addressByCep">
                                <div class="form-row">
                                    <label for="customerCep">CEP</label>
                                    <div class="cep-row">
                                        <input type="text" id="customerCep" placeholder="00000-000" maxlength="9" inputmode="numeric">
                                        <button type="button" class="btn btn-secondary" id="customerCepSearch">Buscar</button>
                                    </div>
                                </div>
                                <div class="form-grid">
                                    <div class="form-row form-row-wide">
                                        <label for="customerStreet">Logradouro</label>
                                        <input type="text" id="customerStreet" readonly placeholder="Preenchido pelo CEP">
                                    </div>
                                    <div class="form-row">
                                        <label for="customerNumber">Número *</label>
                                        <input type="text" id="customerNumber" placeholder="123">
                                    </div>
                                    <div class="form-row">
                                        <label for="customerComplement">Complemento</label>
                                        <input type="text" id="customerComplement" placeholder="Apto, bloco...">
                                    </div>
                                    <div class="form-row">
                                        <label for="customerNeighborhood">Bairro</label>
                                        <input type="text" id="customerNeighborhood" readonly>
                                    </div>
                                    <div class="form-row">
                                        <label for="customerCity">Cidade</label>
                                        <input type="text" id="customerCity" readonly>
                                    </div>
                                    <div class="form-row">
                                        <label for="customerState">UF</label>
                                        <input type="text" id="customerState" readonly maxlength="2">
                                    </div>
                                </div>
                            </div>

                            <div id="addressManual" class="hidden">
                                <div class="form-row">
                                    <label for="customerAddress">Endereço completo</label>
                                    <input type="text" id="customerAddress" placeholder="Rua, número, bairro, cidade">
                                </div>
                            </div>
                        </fieldset>

                        <button type="submit" class="btn btn-primary" id="customerSubmit">Cadastrar cliente</button>
                    </form>
                </div>
            </section>

            <div class="orders-list" id="ordersList">
                <div class="loading-overlay">Carregando pedidos...</div>
            </div>

            <div style="text-align:center;margin-top:1.5rem">
                <button class="btn btn-secondary hidden" id="loadMoreBtn">Carregar mais</button>
            </div>
        </div>
    </main>

    <script src="../Scripts/orderManager.config.js"></script>
    <script src="../Scripts/orderManager.app.js"></script>
    <script src="../Scripts/orderManager.api.js"></script>
    <script src="../Scripts/orderManager.orders.js"></script>
</body>
</html>
